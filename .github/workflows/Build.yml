name: Build k6a-daemon + Package Module

on:
  push:
    branches:
      - main
    paths:
      - 'k6a-daemon/**'
      - 'module/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            k6a-daemon/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('k6a-daemon/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r25
        run: |
          sdkmanager --install "ndk;25.2.9519653" --sdk_root=$ANDROID_SDK_ROOT
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Configure Cargo linker
        run: |
          LINKER="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang"
          AR="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          mkdir -p k6a-daemon/.cargo
          cat > k6a-daemon/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "$LINKER"
          ar = "$AR"
          EOF

      - name: Build k6a-daemon
        working-directory: k6a-daemon
        run: |
          cargo build --release --target aarch64-linux-android
          ls -lh target/aarch64-linux-android/release/k6a-daemon

      - name: Package flashable zip
        run: |
          BINARY="k6a-daemon/target/aarch64-linux-android/release/k6a-daemon"
          STAGING="/tmp/staging"
          OUT="/tmp/BadazZ89_k6a_Optimizer_v3.10.zip"

          mkdir -p "$STAGING/bin"
          mkdir -p "$STAGING/webroot"
          mkdir -p "$STAGING/config"
          mkdir -p "$STAGING/run"
          mkdir -p "$STAGING/icon"
          mkdir -p "$STAGING/META-INF/com/google/android"

          cp module/module.prop    "$STAGING/module.prop"
          cp module/service.sh     "$STAGING/service.sh"
          cp module/system.prop    "$STAGING/system.prop"
          cp module/index.html     "$STAGING/webroot/index.html"
          cp "$BINARY"             "$STAGING/bin/k6a-daemon"
          chmod 755                "$STAGING/bin/k6a-daemon"

          cat > "$STAGING/customize.sh" << 'CEOF'
          #!/system/bin/sh
          SKIPUNZIP=1
          ui_print "BadazZ89 k6a Optimizer v3.10"
          ui_print "SD730 / sweet2"
          unzip -o "$ZIPFILE" -d "$MODPATH"
          set_perm "$MODPATH/service.sh"        root root 0755
          set_perm "$MODPATH/bin/k6a-daemon"    root root 0755
          set_perm "$MODPATH/boot-completed.sh" root root 0755
          mkdir -p "$MODPATH/run"
          mkdir -p "$MODPATH/config"
          CEOF

          cat > "$STAGING/post-fs-data.sh" << 'PEOF'
          #!/system/bin/sh
          MODDIR=${0%/*}
          mkdir -p "$MODDIR/run"
          mkdir -p "$MODDIR/config"
          PEOF

          cat > "$STAGING/boot-completed.sh" << 'BEOF'
          #!/system/bin/sh
          MODDIR=${0%/*}
          DAEMON="$MODDIR/bin/k6a-daemon"
          PIDFILE="$MODDIR/run/daemon.pid"
          LOG="$MODDIR/config/daemon.log"
          mkdir -p "$MODDIR/run"
          if [ -f "$PIDFILE" ]; then
              OLD=$(cat "$PIDFILE" 2>/dev/null)
              [ -n "$OLD" ] && kill "$OLD" 2>/dev/null
              rm -f "$PIDFILE"
          fi
          if [ -x "$DAEMON" ]; then
              "$DAEMON" >> "$LOG" 2>&1 &
              echo $! > "$PIDFILE"
          fi
          BEOF

          echo "#MAGISK" > "$STAGING/META-INF/com/google/android/updater-script"

          cd "$STAGING"
          zip -r "$OUT" .
          ls -lh "$OUT"

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: BadazZ89-k6a-Optimizer-v3.10
          path: /tmp/BadazZ89_k6a_Optimizer_v3.10.zip
          retention-days: 30
